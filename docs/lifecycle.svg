<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <rect width="880" height="470" fill="#ffffff"/>
  <text x="440" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">A note's life: shield, private transfer, withdraw</text>

  <!-- three stage columns -->
  <g>
    <rect x="40"  y="56" width="250" height="30" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
    <rect x="315" y="56" width="250" height="30" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="590" y="56" width="250" height="30" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="165" y="76" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0e7490">1. SHIELD (deposit)</text>
    <text x="440" y="76" text-anchor="middle" font-size="13.5" font-weight="700" fill="#6d28d9">2. TRANSFER (private)</text>
    <text x="715" y="76" text-anchor="middle" font-size="13.5" font-weight="700" fill="#b45309">3. WITHDRAW</text>
  </g>

  <!-- HIDDEN row -->
  <text x="30" y="120" font-size="11" font-weight="600" fill="#dc2626" transform="rotate(-90 30 120)" text-anchor="middle">HIDDEN</text>
  <rect x="40" y="98" width="800" height="86" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-dasharray="4 3"/>
  <text x="165" y="122" text-anchor="middle" font-size="11" fill="#7f1d1d">Alice picks secrets</text>
  <text x="165" y="140" text-anchor="middle" font-size="10.5" fill="#991b1b">spend_key_A, rho_A</text>
  <text x="165" y="160" text-anchor="middle" font-size="10.5" fill="#991b1b">cm_A = H(TAG_LEAF,</text>
  <text x="165" y="174" text-anchor="middle" font-size="10.5" fill="#991b1b">H(TAG_PK, sk_A), rho_A)</text>

  <text x="440" y="122" text-anchor="middle" font-size="11" fill="#7f1d1d">Alice proves in zero knowledge</text>
  <text x="440" y="140" text-anchor="middle" font-size="10.5" fill="#991b1b">knows sk_A, rho_A, Merkle path</text>
  <text x="440" y="158" text-anchor="middle" font-size="10.5" fill="#991b1b">Bob's cm_B hides sk_B, rho_B</text>
  <text x="440" y="176" text-anchor="middle" font-size="10.5" fill="#991b1b">(no link cm_A &#8594; cm_B revealed)</text>

  <text x="715" y="122" text-anchor="middle" font-size="11" fill="#7f1d1d">Bob proves in zero knowledge</text>
  <text x="715" y="140" text-anchor="middle" font-size="10.5" fill="#991b1b">knows sk_B, rho_B, Merkle path</text>
  <text x="715" y="164" text-anchor="middle" font-size="10.5" fill="#991b1b">amount is fixed, never stated</text>

  <!-- arrows hidden -> onchain -->
  <g stroke="#94a3b8" stroke-width="2">
    <line x1="165" y1="184" x2="165" y2="212"/><polygon points="165,220 159,208 171,208" fill="#94a3b8"/>
    <line x1="440" y1="184" x2="440" y2="212"/><polygon points="440,220 434,208 446,208" fill="#94a3b8"/>
    <line x1="715" y1="184" x2="715" y2="212"/><polygon points="715,220 709,208 721,208" fill="#94a3b8"/>
  </g>
  <text x="180" y="204" font-size="10" fill="#64748b">publish</text>
  <text x="455" y="204" font-size="10" fill="#64748b">submit proof</text>
  <text x="730" y="204" font-size="10" fill="#64748b">submit proof</text>

  <!-- ON-CHAIN row -->
  <text x="30" y="300" font-size="11" font-weight="600" fill="#0d9488" transform="rotate(-90 30 300)" text-anchor="middle">ON-CHAIN</text>
  <rect x="40" y="222" width="800" height="156" rx="8" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="165" y="246" text-anchor="middle" font-size="11" fill="#134e4a">append leaf cm_A</text>
  <text x="165" y="264" text-anchor="middle" font-size="10.5" fill="#0f766e">+1 denomination in pool</text>
  <text x="165" y="282" text-anchor="middle" font-size="10.5" fill="#0f766e">new root &#8594; recent ring</text>

  <text x="440" y="246" text-anchor="middle" font-size="11" fill="#134e4a">reveal nullifier nf_A</text>
  <text x="440" y="264" text-anchor="middle" font-size="10.5" fill="#0f766e">consume nf_A (spent set)</text>
  <text x="440" y="282" text-anchor="middle" font-size="10.5" fill="#0f766e">append leaf cm_B</text>
  <text x="440" y="300" text-anchor="middle" font-size="10.5" fill="#0f766e">balance unchanged</text>

  <text x="715" y="246" text-anchor="middle" font-size="11" fill="#134e4a">reveal nullifier nf_B</text>
  <text x="715" y="264" text-anchor="middle" font-size="10.5" fill="#0f766e">consume nf_B (spent set)</text>
  <text x="715" y="282" text-anchor="middle" font-size="10.5" fill="#0f766e">pay 1 denom to recipient</text>

  <!-- the pool box -->
  <rect x="120" y="316" width="640" height="48" rx="6" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/>
  <text x="440" y="336" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Immutable pool contract</text>
  <text x="440" y="354" text-anchor="middle" font-size="11" fill="#475569">Merkle tree of commitments &#183; recent-roots ring (EIP-8272) &#183; nullifier set (EIP-8250)</text>

  <text x="440" y="410" text-anchor="middle" font-size="11.5" fill="#334155">Every spend checks: claim = H(TAG_CLAIM, H(root &#8214; nf), H(out_cm &#8214; ctx)) matches the proof,</text>
  <text x="440" y="428" text-anchor="middle" font-size="11.5" fill="#334155">root is recent, nullifier is unspent. The chain sees commitments, nullifiers, and roots, never who or how much.</text>
  <text x="440" y="452" text-anchor="middle" font-size="10.5" fill="#94a3b8">fixed denomination &#183; no token &#183; no governance &#183; no admin &#183; no viewing keys &#183; no compliance backdoor</text>
</svg>

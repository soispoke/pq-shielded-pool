<svg viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <rect width="860" height="440" fill="#ffffff"/>
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">A private transfer is an ordinary frame transaction</text>
  <text x="430" y="50" text-anchor="middle" font-size="12" fill="#64748b">the pool needs no privileged infrastructure: its three rules are three existing EIPs</text>

  <!-- the frame tx card -->
  <rect x="255" y="72" width="350" height="122" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="430" y="94" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3730a3">EIP-8141 frame transaction</text>
  <line x1="270" y1="102" x2="590" y2="102" stroke="#c7d2fe"/>
  <text x="272" y="122" font-size="11.5" fill="#1e293b">nonce_keys = [ <tspan fill="#be123c" font-weight="600">nf</tspan> ]        &#8594; EIP-8250</text>
  <text x="272" y="144" font-size="11.5" fill="#1e293b">VERIFY frame:</text>
  <text x="286" y="163" font-size="11.5" fill="#1e293b">root ref = (source_id, slot, <tspan fill="#0d9488" font-weight="600">root</tspan>)  &#8594; EIP-8272</text>
  <text x="286" y="181" font-size="11.5" fill="#1e293b">out_cm, ctx, <tspan fill="#7c3aed" font-weight="600">leanVM proof</tspan>  &#8594; EIP-8288</text>

  <!-- three EIP pillars -->
  <g>
    <rect x="40"  y="232" width="240" height="94" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="1.5"/>
    <text x="160" y="254" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">EIP-8250 keyed nonces</text>
    <text x="160" y="274" text-anchor="middle" font-size="10.8" fill="#7f1d1d">the nullifier is a non-zero nonce key</text>
    <text x="160" y="291" text-anchor="middle" font-size="10.8" fill="#7f1d1d">unused-key check = spent-once check</text>
    <text x="160" y="308" text-anchor="middle" font-size="10.8" fill="#7f1d1d">atomic at payment-approval; MAX 16</text>

    <rect x="310" y="232" width="240" height="94" rx="8" fill="#f0fdfa" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="430" y="254" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0f766e">EIP-8272 recent roots</text>
    <text x="430" y="274" text-anchor="middle" font-size="10.8" fill="#134e4a">pool writes 1 root/block (msg.sender)</text>
    <text x="430" y="291" text-anchor="middle" font-size="10.8" fill="#134e4a">proof references any root in the</text>
    <text x="430" y="308" text-anchor="middle" font-size="10.8" fill="#134e4a">last RECENT_ROOT_LENGTH = 8192 slots</text>

    <rect x="580" y="232" width="240" height="94" rx="8" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="700" y="254" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6d28d9">EIP-8288 aggregation</text>
    <text x="700" y="274" text-anchor="middle" font-size="10.8" fill="#4c1d95">proof is a leanSTARK dependency</text>
    <text x="700" y="291" text-anchor="middle" font-size="10.8" fill="#4c1d95">data_hash label = the claim</text>
    <text x="700" y="308" text-anchor="middle" font-size="10.8" fill="#4c1d95">many pool proofs fold into one</text>
  </g>

  <!-- connectors from card to pillars -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none">
    <path d="M300,194 C230,214 175,214 160,230"/>
    <line x1="430" y1="194" x2="430" y2="230"/>
    <path d="M560,194 C630,214 685,214 700,230"/>
  </g>

  <!-- pool contract recomputes claim -->
  <rect x="180" y="356" width="500" height="56" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="430" y="378" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0f172a">Immutable pool contract recomputes and pins the claim</text>
  <text x="430" y="398" text-anchor="middle" font-size="11" fill="#475569">claim = H(TAG_CLAIM, H(root &#8214; nf), H(out_cm &#8214; ctx)) &#8212; the proof is meaningful only against it</text>
  <g stroke="#94a3b8" stroke-width="1.5">
    <line x1="160" y1="326" x2="300" y2="356"/>
    <line x1="430" y1="326" x2="430" y2="356"/>
    <line x1="700" y1="326" x2="560" y2="356"/>
  </g>
</svg>

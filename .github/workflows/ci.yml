name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tooling/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install pinned dependencies
        run: |
          npm ci --prefix tooling
          python -m pip install --requirement requirements.txt

      - name: Reject critical dependency advisories
        run: npm audit --prefix tooling --omit=dev --audit-level=critical

      - name: Compile circuit
        run: |
          mkdir -p /tmp/shielded-pool-circuit
          tooling/node_modules/.bin/circom2 circuits/spend.circom \
            --r1cs --wasm --sym -l tooling/node_modules \
            -o /tmp/shielded-pool-circuit
          tooling/node_modules/.bin/snarkjs r1cs info /tmp/shielded-pool-circuit/spend.r1cs

      - name: Check generated Yul bytecode
        run: |
          forge build --root contracts
          python devnet/yul_pool.py --artifact >/dev/null
          git diff --exit-code -- devnet/build/shielded_pool_init.hex
          python devnet/dispatcher.py --artifact >/dev/null
          git diff --exit-code -- devnet/build/shielded_pool_dispatcher_init.hex
          python devnet/dispatcher.py --initcode \
            0x0000000000000000000000000000000000000001 \
            0x0000000000000000000000000000000000000002 >/dev/null
          python devnet/paymaster.py --runtime \
            0x0000000000000000000000000000000000000001 \
            0x0000000000000000000000000000000000000002 >/dev/null
          python devnet/probe.py --runtime >/dev/null
          python devnet/shared_sender.py --runtime \
            0x0000000000000000000000000000000000000001 >/dev/null

      - name: Check Python and frame-vector code
        run: |
          python -m py_compile \
            devnet/dispatcher.py devnet/frametx.py devnet/paymaster.py \
            devnet/pool_frametx.py devnet/probe.py devnet/shared_sender.py \
            wallet/gen_nonce_race.py wallet/gen_smoke.py wallet/wallet.py \
            reference/gen_poseidon_sol.py reference/poseidon_bn254.py \
            tooling/patch_verifier.py
          python devnet/frametx.py
          python wallet/wallet.py
          python reference/poseidon_bn254.py

      - name: Test contracts
        working-directory: contracts
        run: |
          forge fmt --check
          forge lint --deny warnings
          # A preceding `forge build` can leave ABI-only test artifacts in
          # Foundry's cache. Force recompilation so test discovery cannot
          # silently collapse to a partial suite.
          forge test --force -vv
